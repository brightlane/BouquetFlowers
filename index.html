            --light: #f9fafb;
            --gray: #6b7280;

        * {

            margin: 0;
            padding: 0;

            scroll-behavior: smooth;

            color: var(--dark);
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;

        /* FLORAL BACKGROUND PATTERN */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-image:
                radial-gradient(circle at 15% 85%, rgba(255,182,193,0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(144,238,144,0.15) 0%, transparent 40%),
                radial-gradient(circle at 45% 45%, rgba(255,218,185,0.1) 0%, transparent 50%);
            animation: float 22s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-15px) rotate(120deg);
            }
            66% {
                transform: translateY(-8px) rotate(240deg);
            }
        }

        /* URGENCY COUNTDOWN BAR */
        .urgency-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 0;
            text-align: center;
            font-weight: 900;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            animation: pulse-bar 2.5s infinite;
        }

        .urgency-bar:hover {
            transform: scale(1.005);
        }

        @keyframes pulse-bar {
            0%, 100% {
                box-shadow: 0 8px 32px rgba(220,38,38,0.6);
            }
            50% {
                box-shadow: 0 12px 48px rgba(220,38,38,0.8);
            }
        }

        .countdown-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.25);
            padding: 6px 15px;
            border-radius: 22px;
            backdrop-filter: blur(12px);
            font-family: 'Courier New', monospace;
            font-size: 1.05rem;
            font-weight: 800;
        }

        .countdown-item {
            text-align: center;
            min-width: 42px;
            color: #fff;
        }

        .countdown-number {
            font-size: 1.25rem;
            font-weight: 900;
            display: block;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .countdown-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 9999;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            padding: 16px 0 10px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.13);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--mint));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            cursor: pointer;
        }

        .header-cta {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 13px 32px;
            border-radius: 38px;
            font-weight: 900;
            text-decoration: none;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .header-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 60px rgba(220,38,38,0.6);
        }

        /* HERO (headlines nicely spaced below header) */
        .hero {
            padding: 30px 30px 20px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .hero h1 {
            margin-top: -0.3rem;
            margin-bottom: 10px;
            font-size: clamp(2.2rem, 4.2vw, 3.4rem);
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -0.5px;
            text-shadow: 1.5px 1.5px 4px rgba(0,0,0,0.13);
            transition: all 0.3s;
        }

        .hero h1:hover {
            color: var(--primary);
        }

        .sub-headline {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 16px 0;
            color: var(--primary);
            text-align: center;
            cursor: pointer;
        }

        /* DATE BELOW HEADLINE */
        .date-row {
            margin: 14px 0 24px;
            font-size: 0.98rem;
            color: var(--primary);
            font-weight: 700;
            text-align: center;
        }

        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* FEATURES GRID (4 BOXES, NOW GEOMETRIC) */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: white;
            border-radius: 9.5px;
            padding: 18px 14px;
            text-align: center;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border-top: 3px solid var(--primary);
            cursor: pointer;
            animation: zoom-pulse 5s ease-in-out infinite alternate;
        }

        .feature-icon {
            width: 46px;
            height: 46px;
            margin: 0 auto 9px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
        }

        .feature-card h3 {
            font-size: 1.07rem;
            font-weight: 700;
            margin-bottom: 5.5px;
        }

        .feature-card p {
            font-size: 0.83rem;
            color: var(--gray);
        }

        @keyframes zoom-pulse {
            0% {
                transform: scale(0.98);
            }
            100% {
                transform: scale(1.025);
            }
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            gap: 11px;
            text-align: center;
            margin: 18px 0;
        }

        .stat {

            padding: 16px 11px;
            border-radius: 9.5px;

            cursor: pointer;
        }

        .stat:hover {
            transform: scale(1.015);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            display: block;
        }

        .stat-label {
            font-size: 0.78rem;
            font-weight: 600;
            opacity: 0.93;

            font-size: 0.88rem;

            transition: all 0.3s;

        .testimonial::before {

        .testimonial p {

        }

        .testimonial-author {

            color: var(--primary);

        }

        .pricing-card {

        .pricing-card:hover {

        }

        .pricing-card.featured {

        }

        .price {
            font-size: 1.8rem;

            color: var(--primary);
            margin: 9px 0;
        }

        .price sub {
            font-size: 0.78rem;
            color: var(--gray);
        }

        .pricing-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));

        }

        /* FAQ */

        }

        .faq-item {
            background: white;

        }

        .faq-item.active .faq-answer {

        }

        .faq-icon {
            font-size: 0.92rem;
            transition: transform 0.3s;
        }

        .faq-item.active .faq-icon {
            transform: rotate(45deg);

        .zip-list {

// CLOCK TICKS EVERY 10 SECONDS (URGENCY COUNTDOWN)
function updateLiveCountdown() {
    const now = new Date();
    const holidayDate = HOLIDAYS[currentHoliday];
    let diff = holidayDate - now;

    if (diff <= 0) {
        // if holiday is past, move to next one immediately
        rotationIndex = (rotationIndex + 1) % holidayKeys.length;
        currentHoliday = holidayKeys[rotationIndex];
        diff = HOLIDAYS[currentHoliday] - now;
    }

    const days    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent    = days.toString().padStart(2, '0');
    document.getElementById('hours').textContent   = hours.toString().padStart(2, '0');
    document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
    document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
}

// start countdown immediately
updateLiveCountdown();
setInterval(updateLiveCountdown, 10 * 1000); // 10 seconds
